# =====================================================================
# Test configuration.
#
# Only the JPA slice test (@DataJpaTest, DeliveryRepositoryTest) loads a
# Spring context; it runs against an in-memory H2 database in MySQL
# compatibility mode so the production MySQL DDL (incl. TEXT columns) maps
# cleanly without needing a real database. The service- and controller-layer
# tests are plain Mockito / standalone-MockMvc tests and ignore this file.
# =====================================================================

spring.datasource.url=jdbc:h2:mem:adstudio_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# JWT placeholders so any property-bound bean that is loaded does not fail.
app.jwt.secret=test-secret-test-secret-test-secret-0123456789-abcdef
app.jwt.expiration-ms=3600000
jwt.secret=${app.jwt.secret}

adstudio.services.delivery.base-url=http://localhost:8181
