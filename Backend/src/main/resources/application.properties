# =====================================================================
# AdStudio monolith - application configuration
# =====================================================================

spring.application.name=adstudio
server.port=8181

# ---------------------------------------------------------------------
# Datasource (single MySQL database for all modules)
# Override via env vars or your own application-*.properties as needed.
# ---------------------------------------------------------------------
spring.datasource.url=jdbc:mysql://localhost:3306/adstudio_monolith?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---------------------------------------------------------------------
# JPA / Hibernate
# Schema is generated from the entity mappings (ddl-auto=update).
# Flyway is intentionally not used in the monolith.
# ---------------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# ---------------------------------------------------------------------
# JSON Web Token (consumed by the IAM module)
# IMPORTANT: the secret must be at least 256 bits (32+ chars) for HS256.
# Change this before any non-local use.
# ---------------------------------------------------------------------
app.jwt.secret=adstudio-monolith-change-me-please-0123456789-abcdefghijklmnop
app.jwt.expiration-ms=86400000

# Declared by the finance module's properties contract; harmless placeholder.
jwt.secret=${app.jwt.secret}

# ---------------------------------------------------------------------
# Finance -> Delivery integration
# Points at this same application (the monolith calls itself over HTTP for
# the cross-module delivered-figure lookups). The delivery module is now
# implemented, so invoice generation and reconciliation resolve against:
#   GET /api/delivery/campaigns/{briefId}/delivered-spend
#   GET /api/delivery/insertion-orders/{ioId}/delivered-value
# ---------------------------------------------------------------------
adstudio.services.delivery.base-url=http://localhost:8181

# ---------------------------------------------------------------------
# Delivery module - pacing thresholds (bound by DeliveryConfig).
# Actual delivery (from accepted records) is compared against the planned
# targets supplied on the evaluate call:
#   pacing% < under  -> UnderDelivery alert
#   pacing% > over   -> OverDelivery alert
# A BudgetExhausted alert is raised once accepted spend reaches the planned
# budget, and FlightEndApproaching once the flight end is within the warning
# window. Values below are the defaults; override per environment.
# ---------------------------------------------------------------------
adstudio.delivery.pacing.under-delivery-threshold=80
adstudio.delivery.pacing.over-delivery-threshold=110
adstudio.delivery.pacing.flight-end-warning-days=3

# ---------------------------------------------------------------------
# File uploads (creative module)
# ---------------------------------------------------------------------
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ---------------------------------------------------------------------
# Swagger / OpenAPI (springdoc) - standardized to defaults
# UI:   http://localhost:8181/swagger-ui.html
# Docs: http://localhost:8181/v3/api-docs   (per group: /v3/api-docs/{group})
# ---------------------------------------------------------------------
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ---------------------------------------------------------------------
# Actuator
# ---------------------------------------------------------------------
management.endpoints.web.exposure.include=health,info
